<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Tiếng Anh</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #74ebd5, #acb6e5);
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background:#fff;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:300px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button {
    margin-top:20px;
    width:80px;
    height:80px;
    border-radius:50%;
    border:none;
    font-size:30px;
    background:#ff7eb3;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔊 Nghe câu</h2>
    <button onclick="toggle()">▶</button>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");

// 👉 Lấy link từ URL (?file=...)
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

// 👉 Nếu có file thì gán
if(file){
    audio.src = file;
}else{
    alert("Thiếu file audio!");
}

function toggle(){
    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}
</script>

</body>
</html>

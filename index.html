<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nghe phát âm</title>

<style>
body {
    font-family: Arial;
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

button {
    font-size: 30px;
    padding: 20px;
    border-radius: 50%;
    border: none;
    background: pink;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2 id="title">Đang tải...</h2>
    <button onclick="play()">▶</button>
    <br><br>
    <audio id="audio"></audio>
</div>

<script>
// Lấy số câu từ URL (?file=01)
const params = new URLSearchParams(window.location.search);
let file = params.get("file") || "01";

// Hiển thị tiêu đề
document.getElementById("title").innerText = "Câu " + file;

// Link audio (CHUẨN)
const audio = document.getElementById("audio");
audio.src = `https://raw.githubusercontent.com/duhoangtu28-pixel/audio-player/main/${file}-Sound%20${file}.wav`;

// Nút play
function play() {
    audio.play();
}
</script>

</body>
</html>
